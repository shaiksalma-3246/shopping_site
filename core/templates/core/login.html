{% extends 'core/base.html' %}
{% block content %}
  <div class="auth-card">
    <h2>Login</h2>
    <p>Access your account to manage orders, track purchases, and keep your cart safe.</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
  </div>
{% endblock %}
